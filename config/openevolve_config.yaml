# OpenEvolve configuration for AgentSociety CrewAI agent prompt evolution
# Initial program : config/agents_evolving.yaml
# Evaluator       : openevolve_evaluator.py
# Run command     :
#   uv run openevolve config/agents_evolving.yaml openevolve_evaluator.py \
#     --config config/openevolve_config.yaml \
#     --output config/openevolve_output

# ── General ───────────────────────────────────────────────────────────────────
max_iterations: 50
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

# ── Evolution strategy ────────────────────────────────────────────────────────
# Full-rewrite is recommended for YAML / prompt evolution
# (diff-based mode generates SEARCH/REPLACE patches that easily corrupt YAML structure)
diff_based_evolution: false
language: "text"
max_code_length: 10000

# ── LLM ───────────────────────────────────────────────────────────────────────
llm:
  models:
    - name: "minimaxai/minimax-m2.7"
      weight: 1.0
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: null          # reads from OPENAI_API_KEY env variable
  temperature: 0.7
  max_tokens: 4096
  timeout: 120
  retries: 3           # 改回保守值；過多 retry 會放大整體 wall time 而不一定提高成功率
  retry_delay: 30      # 配合 NVIDIA NIM rate limit window，給合理的等待時間

# ── Prompt ────────────────────────────────────────────────────────────────────
prompt:
  system_message: |
    You are an expert prompt engineer specializing in multi-agent AI systems.
    You are evolving the configuration (role, goal, backstory) of three CrewAI agents
    that simulate user behavior on a review platform:

    1. data_retriever        – retrieves user profile, item details, user's historical reviews,
                                and item's historical reviews via a fixed ReAct tool-calling protocol.
                                Its task description (NOT shown here) hard-codes the exact 4 tool
                                calls it must make.
    2. psychological_analyst – analyses user preference and rating habits from retrieved data
    3. behavior_simulator    – embodies the user persona and produces a star rating + review text

    Your goal is to rewrite the EVOLVE-BLOCK section so that the agents produce
    star ratings closer to the user's actual historical average and reviews that
    match the user's typical tone and sentiment.

    Rules:
    - Keep the YAML structure valid. Do NOT change the `llm:` field of any agent.
    - For data_retriever, you MAY evolve role/goal/backstory, but the backstory MUST
      explicitly remind the agent to follow the tool-calling format from its task
      description verbatim. Do NOT instruct it to skip queries or invent new ones.
    - For psychological_analyst and behavior_simulator, freely evolve all three fields
      to improve rating accuracy and review fidelity.
    - Return the complete YAML file with EVOLVE-BLOCK-START and EVOLVE-BLOCK-END markers.
  num_top_programs: 3
  num_diverse_programs: 2
  include_artifacts: false

# ── Database ──────────────────────────────────────────────────────────────────
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  migration_interval: 10
  migration_rate: 0.1
  # Use built-in features; no custom feature_dimensions needed
  feature_dimensions:
    - "complexity"
    - "diversity"

# ── Evaluator ────────────────────────────────────────────────────────────────
evaluator:
  # Each simulation run: 5 tasks × up to 5 min/task with 2 workers ≈ ~15 min worst case
  timeout: 900
  max_retries: 2
  parallel_evaluations: 1
  cascade_evaluation: false   # we only have evaluate(), no stage1/stage2
